<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Vetëdija</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #0C0B0A;
  color: #FAF8F5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}
.wrap { max-width: 480px; }
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 120px;
  font-weight: 400;
  color: rgba(250,248,245,0.06);
  line-height: 1;
  margin-bottom: 24px;
}
p {
  font-size: 16px;
  font-weight: 300;
  color: rgba(250,248,245,0.45);
  line-height: 1.7;
  margin-bottom: 40px;
}
a {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #0C0B0A;
  background: #C4A882;
  padding: 18px 44px;
  text-decoration: none;
  display: inline-block;
  transition: background 0.3s;
}
a:hover { background: #8B7355; }
</style>
</head>
<body>
<div class="wrap">
  <h1>404</h1>
  <p>Kjo faqe nuk ekziston — por rrugëtimi yt drejt vetëdijes po.</p>
  <a href="/">Kthehu në fillim</a>
</div>
</body>
</html>
